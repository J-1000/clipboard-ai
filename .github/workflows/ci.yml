name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install CLI dependencies
        run: bun install
        working-directory: cli
      - name: Typecheck CLI
        run: bun run typecheck
        working-directory: cli
      - name: Test CLI
        run: bun test
        working-directory: cli
      - name: Build CLI
        run: bun run build
        working-directory: cli

  go:
    # Runs on macOS because golang.design/x/clipboard targets macOS here and
    # requires cgo. On ubuntu its Linux backend needs X11 dev headers
    # (X11/Xlib.h) the runner lacks, so vet/test/build fail at the C stage.
    runs-on: macos-latest
    strategy:
      matrix:
        # Floor (declared in go.mod) plus a current release, so version skew
        # between CI and contributors' toolchains surfaces here.
        go-version: ['1.21', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: agent/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: agent
      - name: Test
        run: go test -race ./...
        working-directory: agent
      - name: Build
        run: go build -o clipboard-ai-agent ./cmd/clipboard-ai-agent/
        working-directory: agent
        env:
          CGO_ENABLED: '1'
      # Boots the freshly built binary and asserts it stays alive — the
      # regression guard for the CGO-disabled startup panic class.
      - name: Boot smoke test
        run: ./scripts/agent-boot-smoke.sh agent/clipboard-ai-agent

  golangci:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: agent/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          working-directory: agent

  raycast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/raycast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
