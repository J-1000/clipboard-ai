name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-agent:
    # golang.design/x/clipboard requires cgo on macOS (-framework Foundation
    # -framework Cocoa); with CGO_ENABLED=0 the build links clipboard_nocgo.go
    # whose initialize() panics at startup. Build natively on a macOS runner.
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            cc: clang
          - goarch: amd64
            cc: clang -arch x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build agent
        run: go build -o clipboard-ai-agent-darwin-${{ matrix.goarch }} ./cmd/clipboard-ai-agent/
        working-directory: agent
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
      - uses: actions/upload-artifact@v4
        with:
          name: agent-darwin-${{ matrix.goarch }}
          path: agent/clipboard-ai-agent-darwin-${{ matrix.goarch }}

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: cli
      - name: Build CLI
        run: bun run build
        working-directory: cli
      - uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: cli/dist/

  release:
    needs: [build-agent, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            clipboard-ai-agent-*
            cli-dist/**
